[theme]
base = "dark"
primaryColor = "#34E0A1"
backgroundColor = "#0E1116"
secondaryBackgroundColor = "#171C26"
textColor = "#F2F5F7"
font = "sans serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"
showErrorDetails = false
