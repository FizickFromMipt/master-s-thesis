name: study

services:
  app:
    image: ghcr.io/fizickfrommipt/master-s-thesis:latest
    build:
      context: ./code/app
      dockerfile: Dockerfile
    pull_policy: always
    container_name: study-app
    restart: unless-stopped
    depends_on:
      vlm:
        condition: service_started
    ports:
      - "${APP_PORT:-8501}:8501"
    environment:
      STREAMLIT_SERVER_ADDRESS: 0.0.0.0
      STREAMLIT_SERVER_PORT: 8501
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
      VLM_URL: "http://vlm:8000"
      UPLOAD_DIR: "/app/uploads"
    volumes:
      # реальные замеры из БЭК (датасет для дообучения VLM)
      - study_uploads:/app/uploads
    networks:
      - study-net

  vlm:
    image: ghcr.io/fizickfrommipt/master-s-thesis-vlm:latest
    build:
      context: ./code/vlm
      dockerfile: Dockerfile
    pull_policy: always
    container_name: study-vlm
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      # тот же датасет — read-only, для дообучения / инференса
      - study_uploads:/app/uploads:ro
    networks:
      - study-net

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - study-net

networks:
  study-net:
    driver: bridge

volumes:
  # external — используем уже существующий volume на сервере
  portainer_data:
    external: true
  # local — для загруженных замеров (создастся compose-ом при первом up)
  study_uploads:
